<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health – Summary</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
  }

  /* ── iPhone shell ── */
  .iphone {
    width: 390px;
    height: 844px;
    border-radius: 52px;
    overflow: hidden;
    position: relative;
    background: #000;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08),
      0 0 0 10px #1a1a1a,
      0 0 0 12px #444,
      0 40px 100px rgba(0,0,0,0.9);
  }

  /* ── Background: purple-blue left + brown-red right gradient, fades to black ── */
  .bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 60% 40% at 15% 8%,  #4a3880 0%, transparent 65%),
      radial-gradient(ellipse 55% 40% at 85% 5%,  #7a3020 0%, transparent 60%),
      radial-gradient(ellipse 80% 35% at 50% 12%, #3a2060 0%, transparent 70%),
      linear-gradient(180deg, #1a0a10 0%, #000 38%);
  }

  /* ── Dynamic Island ── */
  .island {
    position: absolute;
    top: 11px;
    left: 50%;
    transform: translateX(-50%);
    width: 124px;
    height: 34px;
    background: #000;
    border-radius: 18px;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px 0 12px;
  }

  /* Green spiral/claude icon on left of island */
  .island-icon {
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .island-icon svg { width: 16px; height: 16px; }

  /* Green dot on right of island */
  .green-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #30d158;
    box-shadow: 0 0 6px 1px rgba(48,209,88,0.9);
  }

  /* ── Status bar ── */
  .statusbar {
    position: relative;
    z-index: 10;
    height: 54px;
    padding: 16px 22px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    direction: ltr;
  }

  .sb-time {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.3px;
  }

  .sb-right {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* Signal bars */
  .signal {
    display: flex;
    align-items: flex-end;
    gap: 1.5px;
    height: 11px;
  }
  .signal span {
    display: block;
    width: 3px;
    border-radius: 1px;
    background: #fff;
  }

  .sb-5g {
    font-size: 12px;
    font-weight: 700;
    color: #fff;
  }

  /* Battery: "58" with outline */
  .battery-wrap {
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .battery-body {
    width: 22px;
    height: 11px;
    border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 3px;
    position: relative;
    display: flex;
    align-items: center;
    padding: 1.5px;
  }
  .battery-fill {
    width: 58%;
    height: 100%;
    background: #fff;
    border-radius: 1px;
  }
  .battery-nub {
    width: 2px;
    height: 5px;
    background: rgba(255,255,255,0.5);
    border-radius: 0 1px 1px 0;
    margin-left: 1px;
  }
  .battery-pct {
    font-size: 11px;
    font-weight: 500;
    color: #fff;
    letter-spacing: -0.2px;
  }

  /* ── Scroll area ── */
  .scroll {
    position: relative;
    z-index: 5;
    height: calc(844px - 54px - 82px);
    overflow-y: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .scroll::-webkit-scrollbar { display: none; }

  /* ── Page header: "Summary" left, avatar right ── */
  .page-header {
    padding: 8px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    direction: ltr;
  }

  .page-title {
    font-size: 34px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.8px;
    line-height: 1.1;
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: radial-gradient(circle at 45% 38%, #9ab0cc 0%, #7090b0 60%, #5a7898 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.3px;
    flex-shrink: 0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  /* ── Section: "Pinned" left, "Edit" right ── */
  .section-row {
    padding: 16px 20px 8px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    direction: ltr;
  }

  .section-title {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.4px;
  }

  .section-edit {
    font-size: 16px;
    font-weight: 400;
    color: #007aff;
  }

  /* ── Cards container ── */
  .cards {
    padding: 0 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ── Individual card ── */
  .card {
    background: #1c1c1e;
    border-radius: 16px;
    overflow: hidden;
    direction: ltr;
  }

  /* Card top row */
  .card-top {
    display: flex;
    align-items: center;
    padding: 12px 14px 6px;
    gap: 6px;
    direction: ltr;
  }

  .card-emoji {
    font-size: 16px;
    line-height: 1;
    flex-shrink: 0;
  }

  .card-label {
    font-size: 15px;
    font-weight: 600;
    flex: 1;
    letter-spacing: -0.2px;
  }

  .red    { color: #ff375f; }
  .purple { color: #a056d8; }
  .orange { color: #ff6b00; }

  .card-ts {
    font-size: 13px;
    color: #636366;
    font-weight: 400;
    letter-spacing: -0.1px;
    flex-shrink: 0;
  }

  /* Right-pointing chevron for LTR */
  .chev {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    margin-left: 2px;
  }
  .chev svg { width: 7px; height: 12px; }

  /* ── Card 1: Heart Rate ── */
  .hr-body {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 4px 14px 14px;
  }

  .hr-left {}

  .hr-latest {
    font-size: 13px;
    color: #636366;
    font-weight: 400;
    margin-bottom: 2px;
  }

  .hr-val {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }

  .hr-num {
    font-size: 38px;
    font-weight: 200;
    color: #fff;
    letter-spacing: -2px;
    line-height: 1;
  }

  .hr-unit {
    font-size: 16px;
    font-weight: 400;
    color: #636366;
    letter-spacing: -0.3px;
  }

  /* Vertical bar chart (single tall bar with dot) */
  .hr-chart {
    display: flex;
    align-items: flex-end;
    height: 55px;
    padding-bottom: 2px;
  }

  .hr-bar-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    height: 100%;
    justify-content: flex-end;
  }

  .hr-bar-line {
    width: 3px;
    background: #3a3a3c;
    border-radius: 2px;
    flex: 1;
  }

  .hr-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #ff375f;
    margin-bottom: 0;
    flex-shrink: 0;
  }

  /* ── Card 2: No Data ── */
  .no-data-body {
    padding: 8px 14px 16px;
  }

  .no-data-text {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }

  /* ── Card 3: Steps ── */
  .steps-body {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 4px 14px 14px;
  }

  .steps-val {
    display: flex;
    align-items: baseline;
    gap: 5px;
  }

  .steps-num {
    font-size: 38px;
    font-weight: 200;
    color: #fff;
    letter-spacing: -2px;
    line-height: 1;
  }

  .steps-unit {
    font-size: 16px;
    color: #636366;
    font-weight: 400;
    letter-spacing: -0.3px;
  }

  /* Bar chart — vertical bars, last one orange */
  .bars {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 50px;
  }

  .bar {
    width: 10px;
    border-radius: 3px 3px 0 0;
    background: #3a3a3c;
  }
  .bar.active { background: #ff6b00; }

  /* ── "Show All Health Data" ── */
  .show-all {
    margin: 10px 14px 0;
    background: #1c1c1e;
    border-radius: 16px;
    display: flex;
    align-items: center;
    padding: 13px 14px;
    gap: 10px;
    direction: ltr;
  }

  .show-all-icon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: #2c1820;
    border: 1px solid #4a2030;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .show-all-text {
    font-size: 15px;
    font-weight: 400;
    color: #fff;
    flex: 1;
    letter-spacing: -0.2px;
  }

  /* ── Trends ── */
  .trends-header {
    padding: 22px 20px 10px;
    direction: ltr;
  }

  .trends-title {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.4px;
  }

  .trend-card {
    margin: 0 14px;
    background: #1c1c1e;
    border-radius: 16px;
    display: flex;
    align-items: center;
    padding: 13px 14px;
    gap: 10px;
    direction: ltr;
    /* Slightly cut off at bottom */
  }

  .trend-icon {
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .trend-text {
    font-size: 15px;
    font-weight: 400;
    color: #fff;
    flex: 1;
    letter-spacing: -0.2px;
  }

  /* ── Tab bar ── */
  .tabbar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 82px;
    background: rgba(18,18,18,0.97);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 0.5px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: flex-start;
    justify-content: space-around;
    padding-top: 10px;
    z-index: 20;
    direction: ltr;
  }

  .tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    flex: 1;
  }

  .tab-icon-bg {
    width: 64px;
    height: 32px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Active tab gets dark gray pill */
  .tab.active .tab-icon-bg {
    background: #2c2c2e;
  }

  .tab-icon-bg svg { width: 24px; height: 24px; }

  .tab-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.05px;
  }

  .tab.active .tab-label { color: #007aff; }
  .tab:not(.active) .tab-label { color: #636366; }

  .scroll-pad { height: 16px; }
</style>
</head>
<body>
<div class="iphone">
  <div class="bg"></div>

  <!-- Dynamic Island -->
  <div class="island">
    <!-- Green spiral icon on left -->
    <div class="island-icon">
      <svg viewBox="0 0 16 16" fill="none">
        <path d="M8 2C4.7 2 2 4.7 2 8s2.7 6 6 6 6-2.7 6-6" stroke="#30d158" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M8 5c-1.7 0-3 1.3-3 3s1.3 3 3 3" stroke="#30d158" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="green-dot"></div>
  </div>

  <!-- Status Bar -->
  <div class="statusbar">
    <span class="sb-time">16:43</span>
    <div class="sb-right">
      <div class="signal">
        <span style="height:3px; opacity:0.4;"></span>
        <span style="height:5px; opacity:0.4;"></span>
        <span style="height:8px;"></span>
        <span style="height:11px;"></span>
      </div>
      <span class="sb-5g">5G</span>
      <div class="battery-wrap">
        <div class="battery-body">
          <div class="battery-fill"></div>
        </div>
        <div class="battery-nub"></div>
        <span class="battery-pct">58</span>
      </div>
    </div>
  </div>

  <!-- Scroll -->
  <div class="scroll">

    <!-- Page header -->
    <div class="page-header">
      <span class="page-title">Summary</span>
      <div class="avatar">BS</div>
    </div>

    <!-- Pinned / Edit -->
    <div class="section-row">
      <span class="section-title">Pinned</span>
      <span class="section-edit">Edit</span>
    </div>

    <!-- Cards -->
    <div class="cards">

      <!-- Card 1: Heart Rate -->
      <div class="card">
        <div class="card-top">
          <span class="card-emoji">❤️</span>
          <span class="card-label red">Heart Rate</span>
          <span class="card-ts">22 Apr</span>
          <div class="chev">
            <svg viewBox="0 0 7 12" fill="none">
              <path d="M1 1l5 5-5 5" stroke="#636366" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="hr-body">
          <div class="hr-left">
            <div class="hr-latest">Latest</div>
            <div class="hr-val">
              <span class="hr-num">100</span>
              <span class="hr-unit">BPM</span>
            </div>
          </div>
          <!-- Vertical bar with red dot at bottom -->
          <div class="hr-chart">
            <div class="hr-bar-wrap">
              <div class="hr-bar-line"></div>
              <div class="hr-dot"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Card 2: Sleep Score -->
      <div class="card">
        <div class="card-top">
          <span class="card-emoji">🛏️</span>
          <span class="card-label purple">Sleep Score</span>
          <span class="card-ts">Today</span>
          <div class="chev">
            <svg viewBox="0 0 7 12" fill="none">
              <path d="M1 1l5 5-5 5" stroke="#636366" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="no-data-body">
          <div class="no-data-text">No Data</div>
        </div>
      </div>

      <!-- Card 3: Steps -->
      <div class="card">
        <div class="card-top">
          <span class="card-emoji">🔥</span>
          <span class="card-label orange">Steps</span>
          <span class="card-ts">16:14</span>
          <div class="chev">
            <svg viewBox="0 0 7 12" fill="none">
              <path d="M1 1l5 5-5 5" stroke="#636366" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="steps-body">
          <div class="steps-val">
            <span class="steps-num">4,857</span>
            <span class="steps-unit">steps</span>
          </div>
          <!-- Bar chart: 6 bars, last one orange -->
          <div class="bars">
            <div class="bar" style="height:18px;"></div>
            <div class="bar" style="height:28px;"></div>
            <div class="bar" style="height:20px;"></div>
            <div class="bar" style="height:35px;"></div>
            <div class="bar" style="height:30px;"></div>
            <div class="bar active" style="height:22px;"></div>
          </div>
        </div>
      </div>

    </div><!-- /cards -->

    <!-- Show All Health Data -->
    <div class="show-all">
      <div class="show-all-icon">❤️</div>
      <span class="show-all-text">Show All Health Data</span>
      <div class="chev">
        <svg viewBox="0 0 7 12" fill="none">
          <path d="M1 1l5 5-5 5" stroke="#636366" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <!-- Trends -->
    <div class="trends-header">
      <span class="trends-title">Trends</span>
    </div>

    <div class="trend-card">
      <div class="trend-icon">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M9 14l-4-4 4-4" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M5 10h8a6 6 0 0 1 0 12H9" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="trend-text">Health Trends</span>
      <div class="chev">
        <svg viewBox="0 0 7 12" fill="none">
          <path d="M1 1l5 5-5 5" stroke="#636366" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <div class="scroll-pad"></div>
  </div><!-- /scroll -->

  <!-- Tab bar: Summary(active) | Sharing | Search -->
  <div class="tabbar">

    <!-- Summary (active, leftmost in photo) -->
    <div class="tab active">
      <div class="tab-icon-bg">
        <svg viewBox="0 0 24 24">
          <path d="M12 21.5S3 15.8 3 9.8a5.5 5.5 0 0 1 9-4.2 5.5 5.5 0 0 1 9 4.2C21 15.8 12 21.5 12 21.5z" fill="#007aff"/>
        </svg>
      </div>
      <span class="tab-label">Summary</span>
    </div>

    <!-- Sharing -->
    <div class="tab">
      <div class="tab-icon-bg">
        <svg viewBox="0 0 24 24" fill="#636366">
          <circle cx="9" cy="8" r="3.5"/>
          <circle cx="16.5" cy="8" r="3.5" opacity="0.5"/>
          <path d="M1.5 20c0-3.6 3.4-6.5 7.5-6.5s7.5 2.9 7.5 6.5"/>
          <path d="M16.5 13.5c2.5.6 4.5 2.7 4.5 6.5" stroke="#636366" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.5"/>
        </svg>
      </div>
      <span class="tab-label">Sharing</span>
    </div>

    <!-- Search (rightmost) -->
    <div class="tab">
      <div class="tab-icon-bg">
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7.5" stroke="#636366" stroke-width="2"/>
          <path d="M17 17l4 4" stroke="#636366" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="tab-label" style="color:#636366;"></span>
    </div>

  </div>
</div>
</body>
</html>
